# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage
lang: en

# Change to your timezone
timezone: UTC

# jekyll-seo-tag settings
# ↓ --------------------------

title: Photoshop Guides
tagline: Professional tutorials and resources for graphic designers
description: >-
  Expert guides on Photoshop, branding, logo design, and vectorization services.

# Fill in the protocol & hostname for your site.
url: "https://photoshopguides.github.io"

github:
  username: photoshopguides

twitter:
  username: photoshopguides

social:
  name: Photoshop Guides
  email: contact@photoshopguides.github.io
  links:
    - https://github.com/photoshopguides
    - https://twitter.com/photoshopguides

# ↑ --------------------------

# Web Analytics Settings
analytics:
  google:
    id: # fill in your Google Analytics ID (e.g., G-XXXXXXXXXX)

# Prefer color scheme setting.
theme_mode: # [light | dark] - Leave empty for system default with toggle

# the avatar on sidebar
avatar: /assets/img/avatar.png

# The URL of the site-wide social preview image
social_preview_image: /assets/img/social-preview.png

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  provider: utterances # Set this to 'utterances' to enable the settings below
  utterances:
    repo: photoshopguides/PhotoshopGuidesNew
    issue_term: pathname

# Self-hosted static assets
assets:
  self_host:
    enabled: false

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

# The base URL of your site - MUST MATCH REPO NAME FOR TESTING
baseurl: "/PhotoshopGuidesNew"

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
